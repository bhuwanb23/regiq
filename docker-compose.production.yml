version: '3.8'

services:
  ai-ml-service:
    image: ghcr.io/regiq/ai-ml-service:production
    build:
      context: ./ai-ml
      dockerfile: Dockerfile
      args:
        - ENVIRONMENT=production
    container_name: regiq-ai-ml-production
    restart: always
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://regiq:${DB_PASSWORD}@postgres:5432/regiq_production
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./ai-ml/.env.production
    volumes:
      - ./ai-ml/logs:/app/logs
      - ./ai-ml/data:/app/data
    networks:
      - regiq-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  postgres:
    image: postgres:14-alpine
    container_name: regiq-postgres-production
    restart: always
    environment:
      POSTGRES_USER: regiq
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: regiq_production
    volumes:
      - postgres_data_production:/var/lib/postgresql/data
    networks:
      - regiq-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regiq"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  redis:
    image: redis:6-alpine
    container_name: regiq-redis-production
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data_production:/data
    networks:
      - regiq-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  regiq-network:
    driver: bridge

volumes:
  postgres_data_production:
  redis_data_production:
