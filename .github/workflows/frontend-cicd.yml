name: Frontend (regiq) CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'regiq/**'
      - '.github/workflows/frontend-cicd.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'regiq/**'

env:
  NODE_VERSION: '20'

jobs:
  lint-and-test:
    name: 🔍 Lint, Doctor & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: regiq/package-lock.json

      - name: 📦 Install dependencies
        run: |
          cd regiq
          npm ci --no-audit --no-fund

      - name: 🩺 Expo Doctor (non-blocking)
        continue-on-error: true
        run: |
          cd regiq
          npx --yes expo-doctor || echo "::warning::expo-doctor reported issues"

      - name: 🧪 Run Jest tests
        run: |
          cd regiq
          npm test -- --passWithNoTests --watchAll=false

  type-check:
    name: 🧰 Static checks
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: regiq/package-lock.json

      - name: 📦 Install dependencies
        run: |
          cd regiq
          npm ci --no-audit --no-fund

      - name: 🧠 node --check on JS sources (smoke parse)
        run: |
          cd regiq
          find src -name '*.js' -print0 | xargs -0 -n1 node --check
